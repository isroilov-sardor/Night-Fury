<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NightFury Learn · Courses</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.layout { display:grid; grid-template-columns:270px 1fr; min-height:calc(100vh - 58px); }
.sidebar {
  background:var(--panel); border-right:2px solid var(--border);
  padding:16px 0; position:sticky; top:58px;
  height:calc(100vh - 58px); overflow-y:auto;
}
.sb-lbl { font-family:var(--font-mono); font-size:9px; letter-spacing:.2em;
           color:var(--teal); text-transform:uppercase;
           padding:0 16px 8px; border-bottom:1px solid var(--border); margin-bottom:8px; }
.cb {
  width:100%; display:flex; align-items:center; gap:10px;
  padding:10px 14px; background:none;
  border:none; border-left:3px solid transparent;
  color:var(--text2); font-family:var(--font-ui);
  font-size:13px; font-weight:600; text-align:left; cursor:pointer; transition:all .18s;
}
.cb:hover { background:var(--panel2); color:var(--text); }
.cb.act { color:var(--teal); background:rgba(0,212,184,.07); border-left-color:var(--teal); }
.cb-icon { font-size:20px; }
.cb-cnt  { font-family:var(--font-mono); font-size:9px; color:var(--text3); }
.ll { padding:2px 0; }
.li {
  width:100%; display:flex; align-items:center; gap:8px;
  padding:9px 14px 9px 42px;
  background:none; border:none; border-left:3px solid transparent;
  color:var(--text2); font-family:var(--font-ui); font-size:12px;
  text-align:left; cursor:pointer; transition:all .18s;
}
.li:hover   { color:var(--text); background:var(--panel2); }
.li.act     { color:var(--teal); background:rgba(0,212,184,.06); border-left-color:var(--teal); }
.li.watched { color:var(--green); }
.li-n { font-family:var(--font-mono); font-size:9px; color:var(--text3); width:18px; }
.li-t { flex:1; line-height:1.3; }
.li-d { font-family:var(--font-mono); font-size:9px; color:var(--text3); white-space:nowrap; }
.li-c { color:var(--green); font-size:10px; }

.content { padding:32px 36px; }
.vw {
  position:relative; width:100%; padding-bottom:56.25%;
  background:#000; border-radius:12px; overflow:hidden;
  margin-bottom:24px; border:2px solid var(--border);
}
.vw iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
.ve {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; background:var(--panel);
}
.ve-i { font-size:56px; opacity:.15; }
.ve-t { font-family:var(--font-mono); font-size:11px; color:var(--text3); letter-spacing:.1em; }

.ln-num   { font-family:var(--font-mono); font-size:10px; color:var(--text3); letter-spacing:.12em; margin-bottom:6px; }
.ln-title { font-family:var(--font-display); font-size:32px; letter-spacing:.04em; }
.ln-hdr   { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:20px; }
.ln-desc  { font-size:14px; color:var(--text2); line-height:1.8; margin-bottom:20px;
             border-left:3px solid var(--teal); padding-left:16px; }
.topics   { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
.tp { font-family:var(--font-mono); font-size:10px; color:var(--text2);
       background:var(--panel2); border:1px solid var(--border);
       padding:5px 14px; border-radius:20px; letter-spacing:.06em; }
.lnav { display:flex; gap:10px; padding-top:24px; border-top:2px solid var(--border); margin-top:24px; }
.lnb {
  flex:1; padding:14px 18px;
  background:var(--panel); border:2px solid var(--border);
  border-radius:8px; color:var(--text2);
  font-family:var(--font-ui); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .18s; display:flex; align-items:center; gap:8px;
}
.lnb:hover { border-color:var(--border2); color:var(--text); }
.lnb.next  { justify-content:flex-end; color:var(--teal); border-color:rgba(0,212,184,.3); }
.lnb.next:hover { background:rgba(0,212,184,.07); }
.lnb:disabled { opacity:.3; cursor:default; }
.pick { display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:60vh; gap:14px; text-align:center; }
.pick-i { font-size:64px; opacity:.1; }
.pick-t { font-family:var(--font-display); font-size:28px; color:var(--text2); letter-spacing:.06em; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">NIGHT<span>FURY</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="courses.html" class="active">Courses</a>
    <a href="viewer.html">3D Library</a>
    <a href="designer.html">3D Designer</a>
  </div>
  <div class="nav-right">
    <span id="pt" style="color:var(--green);font-family:var(--font-mono);font-size:10px"></span>
    <span class="nav-badge">SCHOOL EDITION</span>
  </div>
</nav>
<div class="page" style="padding-top:58px">
<div class="layout">
  <aside class="sidebar" id="sb"></aside>
  <main class="content" id="ct">
    <div class="pick"><div class="pick-i">🎬</div><div class="pick-t">SELECT A LESSON</div>
    <p style="color:var(--text3);font-size:13px">Choose a course from the sidebar to begin.</p></div>
  </main>
</div>
</div>
<script src="assets/data.js"></script>
<script>
var params=new URLSearchParams(location.search);
var aC=params.get('id')||null, aL=null;
var watched=new Set(JSON.parse(localStorage.getItem('nf-watched')||'[]'));
var TAG={amber:'tag-amber',cyan:'tag-teal',purple:'tag-purple',green:'tag-green',teal:'tag-teal',orange:'tag-orange'};

function bSB(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Courses</div>';
  NF.COURSES.forEach(function(c){
    var open=c.id===aC;
    var btn=document.createElement('button');
    btn.className='cb'+(open?' act':'');
    btn.innerHTML='<span class="cb-icon">'+c.icon+'</span><div><div style="font-size:12px;font-weight:700">'+c.title+'</div><div class="cb-cnt">'+c.lessons.length+' LESSONS</div></div>';
    btn.onclick=function(){aC=c.id;aL=null;history.replaceState({},'','?id='+c.id);bSB();showPick();};
    sb.appendChild(btn);
    if(open){
      var ul=document.createElement('div');ul.className='ll';
      c.lessons.forEach(function(l,i){
        var w=watched.has(l.id);
        var li=document.createElement('button');
        li.className='li'+(l.id===aL?' act':'')+(w?' watched':'');
        li.innerHTML='<span class="li-n">'+String(i+1).padStart(2,'0')+'</span>'
          +'<span class="li-t">'+l.title+'</span>'
          +'<span class="li-d">'+l.duration+'</span>'
          +(w?'<span class="li-c">✓</span>':'');
        li.onclick=function(){lL(c,l,i);};
        ul.appendChild(li);
      });
      sb.appendChild(ul);
    }
  });
  updP();
}

function showPick(){
  document.getElementById('ct').innerHTML='<div class="pick"><div class="pick-i">🎬</div><div class="pick-t">SELECT A LESSON</div><p style="color:var(--text3);font-size:13px">Choose a lesson from the sidebar.</p></div>';
}

function lL(course,lesson,idx){
  aL=lesson.id; bSB();
  var tot=course.lessons.length,prev=course.lessons[idx-1],next=course.lessons[idx+1];
  var tagClass=TAG[course.color]||'tag-teal';
  document.getElementById('ct').innerHTML=
    '<div class="vw">'+(lesson.videoId
      ?'<iframe src="https://www.youtube.com/embed/'+lesson.videoId+'?rel=0&modestbranding=1" allowfullscreen></iframe>'
      :'<div class="ve"><div class="ve-i">▶</div><div class="ve-t">NO VIDEO ID IN data.js</div></div>')+'</div>'
    +'<div class="ln-hdr"><div><div class="ln-num"><span class="tag '+tagClass+'">'+course.tag+'</span>&nbsp;&nbsp;LESSON '+String(idx+1).padStart(2,'0')+' / '+String(tot).padStart(2,'0')+'</div><div class="ln-title">'+lesson.title+'</div></div>'
    +'<button class="btn btn-ghost btn-sm" id="mb" onclick="mW(\''+lesson.id+'\')">'+( watched.has(lesson.id)?'✓ WATCHED':'MARK WATCHED')+'</button></div>'
    +'<p class="ln-desc">'+lesson.description+'</p>'
    +'<div class="topics">'+lesson.topics.map(function(t){return'<span class="tp">'+t+'</span>';}).join('')+'</div>'
    +'<div class="lnav">'
    +'<button class="lnb" '+(idx===0?'disabled':'')+(prev?' onclick="gL(\''+course.id+'\','+(idx-1)+')"':'')+'>← '+(prev?prev.title:'')+'</button>'
    +'<button class="lnb next" '+(idx===tot-1?'disabled':'')+(next?' onclick="gL(\''+course.id+'\','+(idx+1)+')"':'')+''+(next?next.title:'')+' →</button>'
    +'</div>';
}
window.gL=function(cid,i){var c=NF.COURSES.find(function(x){return x.id===cid;});if(c&&c.lessons[i])lL(c,c.lessons[i],i);};
window.mW=function(id){
  watched.has(id)?watched.delete(id):watched.add(id);
  localStorage.setItem('nf-watched',JSON.stringify([...watched]));
  var b=document.getElementById('mb');
  if(b)b.textContent=watched.has(id)?'✓ WATCHED':'MARK WATCHED';
  bSB();
};
function updP(){
  var tot=NF.COURSES.reduce(function(a,c){return a+c.lessons.length;},0);
  document.getElementById('pt').textContent=watched.size+' / '+tot+' DONE';
}
bSB();
if(aC){var c=NF.COURSES.find(function(x){return x.id===aC;});if(c&&c.lessons.length)lL(c,c.lessons[0],0);}
</script>
</body>
</html>
