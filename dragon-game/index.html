<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Fury Flight Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="hud">
      <div class="panel">
        <h1>Night Fury Prototype</h1>
        <p>W/S: accel/decel · A/D: turn · ↑/↓: pitch · Shift: brake · Space: fire</p>
      </div>
      <div class="stats">
        <div>Speed: <span id="speed">0</span></div>
        <div>Altitude: <span id="altitude">0</span></div>
        <div>Heat: <span id="heat">0%</span></div>
        <div>Fire CD: <span id="cooldown">Ready</span></div>
      </div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
