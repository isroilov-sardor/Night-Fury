<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightFury Learn · 3D Library</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
.library-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: calc(100vh - var(--nav-h));
}
/* ── Left panel: model grid ── */
.model-panel {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: calc(100vh - var(--nav-h));
  position: sticky; top: var(--nav-h);
  overflow: hidden;
}
.model-panel-top {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-box {
  width: 100%; padding: 9px 14px;
  background: var(--panel2); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--font-mono); font-size: 12px;
  outline: none; transition: border-color .2s;
}
.search-box::placeholder { color: var(--text3); }
.search-box:focus { border-color: var(--amber); }

.filter-row {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.filter-btn {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .08em; padding: 4px 10px;
  border-radius: 20px; border: 1px solid var(--border);
  background: none; color: var(--text3); cursor: pointer;
  transition: all .2s;
}
.filter-btn:hover  { color: var(--text); border-color: var(--border2); }
.filter-btn.active { color: var(--amber); border-color: rgba(255,179,0,.35);
                      background: rgba(255,179,0,.07); }

.model-list { overflow-y: auto; flex: 1; padding: 8px; }
.model-thumb {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius);
  cursor: pointer; border: 1px solid transparent;
  transition: all .2s; margin-bottom: 4px;
}
.model-thumb:hover  { background: var(--panel2); border-color: var(--border); }
.model-thumb.active { background: rgba(255,179,0,.07);
                       border-color: rgba(255,179,0,.25); }
.mt-preview {
  width: 48px; height: 48px; border-radius: var(--radius);
  background: var(--panel2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; overflow: hidden;
}
.mt-preview canvas { width: 48px !important; height: 48px !important; }
.mt-info { flex: 1; min-width: 0; }
.mt-name { font-family: var(--font-ui); font-weight: 600;
           font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mt-cat  { font-family: var(--font-mono); font-size: 9px;
           color: var(--text3); letter-spacing: .07em; margin-top: 2px; }

/* ── Right: viewer ── */
.viewer-area {
  display: flex; flex-direction: column;
  height: calc(100vh - var(--nav-h));
  position: sticky; top: var(--nav-h);
}
.viewer-top {
  flex: 1; position: relative; background: #050709;
  overflow: hidden;
}
#viewer-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.viewer-overlay-br {
  position: absolute; bottom: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.viewer-hint {
  font-family: var(--font-mono); font-size: 9px;
  color: rgba(255,255,255,.2); letter-spacing: .08em;
  text-align: right;
}
.viewer-controls {
  display: flex; gap: 6px;
}
.vc-btn {
  width: 32px; height: 32px;
  background: rgba(15,20,32,.85); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text2);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.vc-btn:hover { border-color: var(--amber); color: var(--amber); }

.viewer-axes {
  position: absolute; top: 16px; left: 16px;
  font-family: var(--font-mono); font-size: 9px;
  color: rgba(255,255,255,.18); letter-spacing: .08em;
  line-height: 1.8;
}
.axis-x { color: rgba(255,80,80,.5); }
.axis-y { color: rgba(80,255,80,.5); }
.axis-z { color: rgba(80,160,255,.5); }

/* ── Info panel ── */
.info-panel {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 20px 28px;
  display: grid; grid-template-columns: 1fr auto;
  gap: 20px; align-items: start;
  flex-shrink: 0;
}
.info-left .info-tag { margin-bottom: 8px; }
.info-name {
  font-family: var(--font-display);
  font-size: 28px; letter-spacing: .05em; margin-bottom: 6px;
}
.info-desc {
  font-size: 13px; color: var(--text2); line-height: 1.65;
  max-width: 500px;
}
.specs-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-top: 16px;
}
.spec-item {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
}
.spec-key { font-family: var(--font-mono); font-size: 9px;
            color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.spec-val { font-family: var(--font-ui); font-weight: 600;
            font-size: 14px; color: var(--text); margin-top: 3px; }

.info-right {
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}

/* Empty viewer */
.viewer-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; pointer-events: none;
}
.ve-icon { font-size: 60px; opacity: .08; }
.ve-text { font-family: var(--font-mono); font-size: 11px;
           color: var(--text3); letter-spacing: .12em; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">NIGHT<span>FURY</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="viewer.html" class="active">3D Library</a>
    <a href="designer.html">3D Designer</a>
  </div>
  <div class="nav-right">
    <span id="model-count-badge" class="nav-badge">— MODELS</span>
  </div>
</nav>

<div class="page" style="padding-top:var(--nav-h)">
  <div class="library-layout">

    <!-- ── Left: model list ── -->
    <div class="model-panel">
      <div class="model-panel-top">
        <input class="search-box" id="search" placeholder="Search models…" oninput="filterModels()">
        <div class="filter-row" id="filter-row"></div>
      </div>
      <div class="model-list" id="model-list"></div>
    </div>

    <!-- ── Right: 3D viewer ── -->
    <div class="viewer-area">
      <div class="viewer-top" id="viewer-top">
        <canvas id="viewer-canvas"></canvas>
        <div class="viewer-empty" id="viewer-empty">
          <div class="ve-icon">📦</div>
          <div class="ve-text">SELECT A MODEL TO VIEW</div>
        </div>
        <div class="viewer-axes" id="viewer-axes" style="display:none">
          <div class="axis-x">X →</div>
          <div class="axis-y">Y ↑</div>
          <div class="axis-z">Z ·</div>
        </div>
        <div class="viewer-overlay-br">
          <div class="viewer-hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>
          <div class="viewer-controls">
            <button class="vc-btn" onclick="resetCamera()" title="Reset view">⟳</button>
            <button class="vc-btn" onclick="toggleWire()" title="Wireframe">⬡</button>
            <button class="vc-btn" onclick="toggleSpin()" title="Auto-spin" id="spin-btn">⟳̃</button>
          </div>
        </div>
      </div>

      <div class="info-panel" id="info-panel">
        <div class="info-left">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:.1em">
            SELECT A MODEL FROM THE LIBRARY
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { MODELS } from './assets/data.js';

// ── Three.js scene setup ─────────────────────────────────────
const canvas  = document.getElementById('viewer-canvas');
const empty   = document.getElementById('viewer-empty');
const axes    = document.getElementById('viewer-axes');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x050709);
scene.fog = new THREE.FogExp2(0x050709, 0.025);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camera.position.set(4, 3, 5);

// Lights
const ambient = new THREE.AmbientLight(0x334455, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeebb, 1.2);
sun.position.set(8, 12, 6);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4488cc, 0.4);
fill.position.set(-6, -4, -8);
scene.add(fill);
const rim = new THREE.PointLight(0x00d4ff, 0.5, 30);
rim.position.set(-5, 6, -4);
scene.add(rim);

// Grid helper
const gridHelper = new THREE.GridHelper(12, 24, 0x1c2538, 0x0f1420);
scene.add(gridHelper);

// Current model group
let modelGroup = null;
let wireframe  = false;
let spinning   = false;
let spinBtn    = document.getElementById('spin-btn');

// Orbit controls (manual)
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.7, phi: 1.0, radius: 7 };

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup',   () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.012;
  spherical.phi    = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.012));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  spherical.radius = Math.max(2, Math.min(20, spherical.radius + e.deltaY * 0.01));
  updateCamera();
}, { passive: true });

// Touch support
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; });
canvas.addEventListener('touchmove',  e => {
  if (!touchStart) return;
  const dx = e.touches[0].clientX - touchStart.clientX;
  const dy = e.touches[0].clientY - touchStart.clientY;
  spherical.theta -= dx * 0.012;
  spherical.phi    = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.012));
  touchStart = e.touches[0];
  updateCamera();
});

function updateCamera() {
  camera.position.set(
    spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    spherical.radius * Math.cos(spherical.phi),
    spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

// Resize
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(canvas);
resize();

// Render loop
function render() {
  requestAnimationFrame(render);
  if (spinning && modelGroup) modelGroup.rotation.y += 0.008;
  renderer.render(scene, camera);
}
render();

// ── Model builders ────────────────────────────────────────────
const MATS = {
  poly:    new THREE.MeshStandardMaterial({ color: 0xc8ddf0, roughness: 0.1, metalness: 0.0, transparent: true, opacity: 0.82 }),
  white:   new THREE.MeshStandardMaterial({ color: 0xe8eef5, roughness: 0.5, metalness: 0.05 }),
  pcbGreen:new THREE.MeshStandardMaterial({ color: 0x1e6b40, roughness: 0.4, metalness: 0.1 }),
  pcbBlue: new THREE.MeshStandardMaterial({ color: 0x2a3580, roughness: 0.5, metalness: 0.0 }),
  esp32:   new THREE.MeshStandardMaterial({ color: 0x226644, roughness: 0.35, metalness: 0.15 }),
  copper:  new THREE.MeshStandardMaterial({ color: 0xc87941, roughness: 0.3, metalness: 0.6 }),
  servo:   new THREE.MeshStandardMaterial({ color: 0x2a2f3d, roughness: 0.45, metalness: 0.2 }),
  servoW:  new THREE.MeshStandardMaterial({ color: 0xe8e8e0, roughness: 0.6, metalness: 0.0 }),
  gear:    new THREE.MeshStandardMaterial({ color: 0x607d8b, roughness: 0.5, metalness: 0.35 }),
  amber:   new THREE.MeshStandardMaterial({ color: 0xffb300, roughness: 0.3, metalness: 0.15, emissive: 0xffb300, emissiveIntensity: 0.1 }),
  sensor:  new THREE.MeshStandardMaterial({ color: 0xd0d8e0, roughness: 0.4, metalness: 0.1 }),
  motor:   new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.4 }),
  battery: new THREE.MeshStandardMaterial({ color: 0x6d8a9c, roughness: 0.35, metalness: 0.5 }),
  rubber:  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95, metalness: 0.0 }),
  alu:     new THREE.MeshStandardMaterial({ color: 0x9ba8b0, roughness: 0.3, metalness: 0.7 }),
};

function mesh(geo, mat) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = m.receiveShadow = true;
  return m;
}

function buildModel(type) {
  const g = new THREE.Group();
  switch(type) {

    case 'hexapod': {
      // Hex body plate
      const shape = new THREE.Shape();
      for (let i=0; i<6; i++) {
        const a = (i/6)*Math.PI*2 - Math.PI/6;
        i===0 ? shape.moveTo(Math.cos(a)*1.8, Math.sin(a)*1.8)
              : shape.lineTo(Math.cos(a)*1.8, Math.sin(a)*1.8);
      }
      shape.closePath();
      const extOpts = { depth: 0.12, bevelEnabled: true, bevelSize: 0.04, bevelThickness: 0.04 };
      const plate = mesh(new THREE.ExtrudeGeometry(shape, extOpts), MATS.poly);
      plate.rotation.x = -Math.PI/2;
      g.add(plate);

      // PCB on top
      const pcb = mesh(new THREE.BoxGeometry(1.1, 0.08, 0.85), MATS.pcbBlue);
      pcb.position.set(0, 0.11, 0);
      g.add(pcb);
      const esp = mesh(new THREE.BoxGeometry(0.7, 0.06, 0.5), MATS.esp32);
      esp.position.set(0, 0.18, 0);
      g.add(esp);

      // 6 Hip mounts
      for (let i=0; i<6; i++) {
        const a = (i/6)*Math.PI*2;
        const hx = Math.cos(a)*1.5, hz = Math.sin(a)*1.5;
        const hip = mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.2, 8), MATS.white);
        hip.position.set(hx, 0.1, hz);
        g.add(hip);
        // Coxa arm
        const coxaLen = 0.7;
        const cx = Math.cos(a)*(1.5+coxaLen/2), cz = Math.sin(a)*(1.5+coxaLen/2);
        const coxa = mesh(new THREE.BoxGeometry(coxaLen, 0.1, 0.1), MATS.white);
        coxa.position.set(cx, 0.06, cz);
        coxa.rotation.y = -a;
        g.add(coxa);
        // Femur
        const fx = Math.cos(a)*(1.5+coxaLen), fz = Math.sin(a)*(1.5+coxaLen);
        const femur = mesh(new THREE.BoxGeometry(0.08, 0.06, 0.9), MATS.poly);
        femur.position.set(fx, -0.2, fz);
        g.add(femur);
      }
      break;
    }

    case 'servo': {
      // Body
      const body = mesh(new THREE.BoxGeometry(0.6, 1.1, 0.55), MATS.servo);
      g.add(body);
      // Top cap
      const cap = mesh(new THREE.BoxGeometry(0.62, 0.22, 0.57), MATS.servoW);
      cap.position.y = 0.66;
      g.add(cap);
      // Horn
      const horn = mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.08, 16), MATS.servoW);
      horn.position.set(0, 0.81, 0);
      g.add(horn);
      const hornArm = mesh(new THREE.BoxGeometry(0.5, 0.06, 0.1), MATS.servoW);
      hornArm.position.set(0.12, 0.88, 0);
      g.add(hornArm);
      // Mounting lugs
      [-0.38, 0.38].forEach(x => {
        const lug = mesh(new THREE.BoxGeometry(0.14, 0.18, 0.55), MATS.servoW);
        lug.position.set(x, -0.46, 0);
        g.add(lug);
      });
      // Label stripe
      const label = mesh(new THREE.BoxGeometry(0.62, 0.3, 0.02), MATS.amber);
      label.position.set(0, 0.1, 0.285);
      g.add(label);
      break;
    }

    case 'pcb': {
      // PCB board
      const board = mesh(new THREE.BoxGeometry(2.4, 0.07, 1.8), MATS.pcbGreen);
      g.add(board);
      // ESP32 chip
      const chip = mesh(new THREE.BoxGeometry(0.8, 0.1, 0.5), MATS.esp32);
      chip.position.set(-0.3, 0.09, 0.2);
      g.add(chip);
      // Servo headers row
      for (let i=0; i<6; i++) {
        const h = mesh(new THREE.BoxGeometry(0.08, 0.18, 0.28), MATS.servoW);
        h.position.set(-0.9 + i*0.28, 0.13, -0.65);
        g.add(h);
      }
      for (let i=0; i<6; i++) {
        const h = mesh(new THREE.BoxGeometry(0.08, 0.18, 0.28), MATS.servoW);
        h.position.set(-0.9 + i*0.28, 0.13, -0.38);
        g.add(h);
      }
      // Capacitors
      [[-0.8, 0.28], [0.4, 0.28], [0.8, 0.28]].forEach(([x,z]) => {
        const cap = mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.22, 12), MATS.copper);
        cap.position.set(x, 0.18, z);
        g.add(cap);
      });
      // USB port
      const usb = mesh(new THREE.BoxGeometry(0.25, 0.12, 0.18), MATS.alu);
      usb.position.set(1.18, 0.1, -0.5);
      g.add(usb);
      // Traces (decorative lines)
      const traceGeo = new THREE.BoxGeometry(2.4, 0.005, 0.01);
      [-0.2, 0, 0.2, 0.4].forEach(z => {
        const t = mesh(traceGeo, MATS.copper);
        t.position.set(0, 0.037, z);
        g.add(t);
      });
      break;
    }

    case 'gear': {
      const numTeeth = 16;
      const shape = new THREE.Shape();
      const ri = 0.7, ro = 1.0, rr = 0.65;
      for (let i=0; i<numTeeth; i++) {
        const a0 = (i/numTeeth)*Math.PI*2;
        const a1 = a0 + 0.1;
        const a2 = a0 + 0.2;
        const a3 = a0 + 0.3;
        if (i===0) shape.moveTo(Math.cos(a0)*ri, Math.sin(a0)*ri);
        else shape.lineTo(Math.cos(a0)*ri, Math.sin(a0)*ri);
        shape.lineTo(Math.cos(a1)*ro, Math.sin(a1)*ro);
        shape.lineTo(Math.cos(a2)*ro, Math.sin(a2)*ro);
        shape.lineTo(Math.cos(a3)*ri, Math.sin(a3)*ri);
      }
      shape.closePath();
      const hole = new THREE.Path();
      hole.absarc(0, 0, 0.2, 0, Math.PI*2, true);
      shape.holes.push(hole);
      const ext = { depth: 0.3, bevelEnabled: false };
      const gear = mesh(new THREE.ExtrudeGeometry(shape, ext), MATS.gear);
      gear.rotation.x = -Math.PI/2;
      g.add(gear);
      // Hub
      const hub = mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.5, 16), MATS.alu);
      hub.position.y = 0.1;
      g.add(hub);
      // Keyway
      const key = mesh(new THREE.BoxGeometry(0.08, 0.5, 0.06), MATS.gear);
      key.position.y = 0.1;
      g.add(key);
      break;
    }

    case 'sensor': {
      // Main body
      const body = mesh(new THREE.BoxGeometry(1.5, 0.25, 0.6), MATS.sensor);
      g.add(body);
      // Two emitter cylinders
      [-0.4, 0.4].forEach(x => {
        const cyl = mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.4, 16), MATS.servoW);
        cyl.rotation.z = Math.PI/2;
        cyl.position.set(x, 0, 0.3);
        g.add(cyl);
        // Lens
        const lens = mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.05, 16), MATS.amber);
        lens.rotation.z = Math.PI/2;
        lens.position.set(x, 0, 0.52);
        g.add(lens);
      });
      // Pins
      for (let i=0; i<4; i++) {
        const pin = mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.5, 8), MATS.copper);
        pin.position.set(-0.45 + i*0.3, -0.38, 0);
        g.add(pin);
      }
      break;
    }

    case 'motor': {
      // NEMA17 body
      const body = mesh(new THREE.BoxGeometry(1.7, 1.7, 1.9), MATS.motor);
      g.add(body);
      // Face plate
      const face = mesh(new THREE.BoxGeometry(1.72, 1.72, 0.12), MATS.alu);
      face.position.z = 1.01;
      g.add(face);
      // Shaft
      const shaft = mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.0, 16), MATS.alu);
      shaft.rotation.x = Math.PI/2;
      shaft.position.z = 1.55;
      g.add(shaft);
      // Corner holes (decorative)
      [[0.65,0.65],[0.65,-0.65],[-0.65,0.65],[-0.65,-0.65]].forEach(([x,y]) => {
        const hole = mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.2, 12), MATS.gear);
        hole.rotation.x = Math.PI/2;
        hole.position.set(x, y, 1.05);
        g.add(hole);
      });
      // Connector
      const conn = mesh(new THREE.BoxGeometry(0.4, 0.22, 0.3), MATS.servoW);
      conn.position.set(0.5, -0.9, 0);
      g.add(conn);
      break;
    }

    case 'battery': {
      // 18650 cell
      const cell = mesh(new THREE.CylinderGeometry(0.55, 0.55, 2.55, 32), MATS.battery);
      g.add(cell);
      // Positive terminal
      const pos = mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.12, 16), MATS.alu);
      pos.position.y = 1.33;
      g.add(pos);
      // Negative terminal (flat)
      const neg = mesh(new THREE.CylinderGeometry(0.54, 0.54, 0.04, 32), MATS.alu);
      neg.position.y = -1.3;
      g.add(neg);
      // Wrap seam lines
      for (let i=0; i<3; i++) {
        const ring = mesh(
          new THREE.TorusGeometry(0.56, 0.015, 8, 32),
          MATS.gear
        );
        ring.position.y = -0.8 + i*0.7;
        g.add(ring);
      }
      break;
    }

    case 'wheel': {
      // Tyre
      const tyre = mesh(new THREE.TorusGeometry(0.8, 0.28, 20, 48), MATS.rubber);
      tyre.rotation.y = Math.PI/2;
      g.add(tyre);
      // Rim
      const rim = mesh(new THREE.CylinderGeometry(0.58, 0.58, 0.22, 24), MATS.servoW);
      rim.rotation.z = Math.PI/2;
      g.add(rim);
      // Spokes
      for (let i=0; i<5; i++) {
        const a = (i/5)*Math.PI*2;
        const spoke = mesh(new THREE.BoxGeometry(0.08, 0.06, 1.0), MATS.servoW);
        spoke.rotation.x = a;
        spoke.rotation.z = Math.PI/2;
        g.add(spoke);
      }
      // Hub
      const hub = mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.28, 16), MATS.alu);
      hub.rotation.z = Math.PI/2;
      g.add(hub);
      break;
    }

    case 'bracket': {
      // L-bracket: two plates
      const p1 = mesh(new THREE.BoxGeometry(0.08, 1.4, 1.0), MATS.alu);
      p1.position.x = 0;
      g.add(p1);
      const p2 = mesh(new THREE.BoxGeometry(1.2, 0.08, 1.0), MATS.alu);
      p2.position.set(0.6, -0.72, 0);
      g.add(p2);
      // M3 holes (dark circles on faces)
      [[0, 0.4], [0, -0.2], [0, -0.55]].forEach(([y,z]) => {
        const h = mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.1, 12), MATS.motor);
        h.rotation.z = Math.PI/2;
        h.position.set(0, y, z);
        g.add(h);
      });
      [[0.4, -0.72], [0.9, -0.72]].forEach(([x,y]) => {
        const h = mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.1, 12), MATS.motor);
        h.position.set(x, y, 0);
        g.add(h);
      });
      break;
    }

    default: {
      const m = mesh(new THREE.BoxGeometry(1,1,1), MATS.white);
      g.add(m);
    }
  }
  return g;
}

// ── Load model into scene ─────────────────────────────────────
window.loadModel = function(id) {
  const model = MODELS.find(m => m.id === id);
  if (!model) return;

  // Clear previous
  if (modelGroup) { scene.remove(modelGroup); modelGroup = null; }
  empty.style.display = 'none';
  axes.style.display  = 'block';

  modelGroup = buildModel(model.type);
  scene.add(modelGroup);
  window._currentModel = model;

  // Update active state in list
  document.querySelectorAll('.model-thumb').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Info panel
  const COLOR_TAG = {
    amber: 'tag-amber', cyan: 'tag-cyan',
    purple: 'tag-purple', green: 'tag-green'
  };
  const specEntries = Object.entries(model.specs);
  document.getElementById('info-panel').innerHTML = `
    <div class="info-left">
      <div class="info-tag">
        <span class="tag ${COLOR_TAG[model.color]}">${model.tag}</span>
        <span class="tag" style="margin-left:6px;color:var(--text3);border-color:var(--border)">${model.category}</span>
      </div>
      <div class="info-name">${model.name}</div>
      <p class="info-desc">${model.description}</p>
      <div class="specs-grid">
        ${specEntries.map(([k,v]) => `
          <div class="spec-item">
            <div class="spec-key">${k}</div>
            <div class="spec-val">${v}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="info-right">
      <button class="btn btn-ghost btn-sm" onclick="resetCamera()">RESET VIEW</button>
      <button class="btn btn-outline btn-sm" onclick="toggleSpin()">AUTO-SPIN</button>
    </div>`;
};

// ── Controls ─────────────────────────────────────────────────
window.resetCamera = function() {
  spherical = { theta: 0.7, phi: 1.0, radius: 7 };
  updateCamera();
};
window.toggleWire = function() {
  wireframe = !wireframe;
  if (modelGroup) {
    modelGroup.traverse(c => {
      if (c.isMesh) c.material.wireframe = wireframe;
    });
  }
};
window.toggleSpin = function() {
  spinning = !spinning;
  spinBtn.style.color = spinning ? 'var(--amber)' : '';
};

// ── Build model list ──────────────────────────────────────────
const CATEGORIES = ['All', ...new Set(MODELS.map(m => m.category))];
let activeFilter = 'All';
let searchQ = '';

function renderList() {
  const list = document.getElementById('model-list');
  const filtered = MODELS.filter(m => {
    const matchCat = activeFilter === 'All' || m.category === activeFilter;
    const matchQ   = m.name.toLowerCase().includes(searchQ) ||
                     m.description.toLowerCase().includes(searchQ);
    return matchCat && matchQ;
  });
  document.getElementById('model-count-badge').textContent = `${filtered.length} MODELS`;
  list.innerHTML = filtered.map(m => `
    <div class="model-thumb" data-id="${m.id}" onclick="loadModel('${m.id}')">
      <div class="mt-preview">${m.type === 'hexapod' ? '🤖' :
        m.type === 'servo' ? '⚙️' : m.type === 'pcb' ? '🔌' :
        m.type === 'gear' ? '⚙' : m.type === 'sensor' ? '📡' :
        m.type === 'motor' ? '🔧' : m.type === 'battery' ? '🔋' :
        m.type === 'wheel' ? '⭕' : m.type === 'bracket' ? '📐' : '📦'}</div>
      <div class="mt-info">
        <div class="mt-name">${m.name}</div>
        <div class="mt-cat">${m.category} · ${m.tag}</div>
      </div>
    </div>`).join('');
}

// Filter buttons
const filterRow = document.getElementById('filter-row');
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = `filter-btn ${cat === 'All' ? 'active' : ''}`;
  btn.textContent = cat;
  btn.onclick = () => {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  };
  filterRow.appendChild(btn);
});

window.filterModels = function() {
  searchQ = document.getElementById('search').value.toLowerCase();
  renderList();
};

renderList();

// Load first model by default
if (MODELS.length) window.loadModel(MODELS[0].id);
</script>
</body>
